version: '3.8'

services:
  jansahayak:
    build: .
    ports:
      - "5000:5000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - FLASK_ENV=development
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./rag/scheme_index:/app/rag/scheme_index
      - ./rag/exam_index:/app/rag/exam_index
    env_file:
      - .env
    restart: unless-stopped
